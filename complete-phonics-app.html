<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Phonics App</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Complete Phonics Learning App</h1>
    </header>
    <main>
        <section id="letter-data">
            <!-- Letter data A-Z goes here -->
            <h2>Letters</h2>
            <div id="alphabet">
                <!-- Letters to be filled in dynamically or statically -->
            </div>
        </section>
        <section id="word-library">
            <h2>Word Library</h2>
            <ul>
                <!-- 140+ words listed here -->
            </ul>
        </section>
        <section id="microphone">
            <h2>Record Audio</h2>
            <button id="record-button">Start Recording</button>
            <button id="stop-button" disabled>Stop Recording</button>
        </section>
        <section id="upload">
            <h2>Upload Custom Words</h2>
            <input type="file" id="file-upload">
        </section>
        <section id="speed-controls">
            <h2>Speed Controls</h2>
            <input type="range" id="speed-control" min="0.5" max="2" step="0.1" value="1">
        </section>
        <section id="categories">
            <h2>Categories</h2>
            <select id="categories-select">
                <option value="all">All</option>
                <!-- More categories can go here -->
            </select>
        </section>
    </main>
    <footer>
        <p>© 2026 Phonics Learning App. All rights reserved.</p>
    </footer>
</body>
</html>
