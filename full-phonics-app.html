<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Enhanced Phonics Learning App</title>  
    <style>  
        body {  
            font-family: Arial, sans-serif;  
            background: linear-gradient(to right, #ffccbc, #ffe0b2);  
            color: #333;  
            text-align: center;  
        }  
        .letter-card {  
            display: inline-block;  
            margin: 20px;  
            padding: 20px;  
            background-color: #fff;  
            border-radius: 10px;  
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);  
            transition: transform 0.3s;  
        }  
        .letter-card:hover {  
            transform: scale(1.1);  
        }  
        /* Additional CSS styling */  
    </style>  
</head>  
<body>  
    <h1>Welcome to the Enhanced Phonics Learning App</h1>  
    <div id="letter-cards"></div>  
    <div id="word-display"></div>  
    <button id="record-btn">Start Recording</button>  
    <button id="stop-btn" disabled>Stop Recording</button>  
    <button id="save-btn" disabled>Save Recording</button>  
    <button id="discard-btn" disabled>Discard Recording</button>  
    <script>  
        let mediaRecorder;  
        let audioChunks = [];  
        const recordBtn = document.getElementById('record-btn');  
        const stopBtn = document.getElementById('stop-btn');  
        const saveBtn = document.getElementById('save-btn');  
        const discardBtn = document.getElementById('discard-btn');  

        recordBtn.onclick = async () => {  
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });  
            mediaRecorder = new MediaRecorder(stream);  
            mediaRecorder.start();  
            recordBtn.disabled = true;  
            stopBtn.disabled = false;  
            mediaRecorder.ondataavailable = event => {  
                audioChunks.push(event.data);  
            };  
        };  

        stopBtn.onclick = () => {  
            mediaRecorder.stop();  
            recordBtn.disabled = false;  
            stopBtn.disabled = true;  
            saveBtn.disabled = false;  
            discardBtn.disabled = false;  
        };  

        mediaRecorder.onstop = () => {  
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });  
            audioChunks = [];  
            const audioUrl = URL.createObjectURL(audioBlob);  
            const audio = new Audio(audioUrl);  
            audio.play();  
        };  

        // Additional JavaScript functionality for phonics app  
    </script>  
</body>  
</html>
