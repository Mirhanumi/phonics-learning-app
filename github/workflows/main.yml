name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Convert Website to APK
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: './' # If your index.html is in the main folder
          app-name: 'PhonicsLearning'
          output-folder-path: 'apk/'

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: MyPhonicsApp
          path: apk/
          
