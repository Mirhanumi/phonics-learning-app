<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Learning App</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Phonics Learning App</h1>

    <h2>Microphone Access</h2>
    <button id="start-recording">Start Recording</button>
    <button id="stop-recording">Stop Recording</button>
    <div id="output"></div>

    <h2>Upload Word Library</h2>
    <input type="file" id="file-upload" />
    <button id="upload-btn">Upload</button>

    <script>
        // Microphone Access
        const output = document.getElementById('output');
        const startButton = document.getElementById('start-recording');
        const stopButton = document.getElementById('stop-recording');
        const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            output.innerHTML = 'You said: ' + transcript;
            localStorage.setItem('lastSpokenPhrase', transcript);
        };

        startButton.addEventListener('click', () => {
            recognition.start();
        });

        stopButton.addEventListener('click', () => {
            recognition.stop();
        });

        // File Upload
        const uploadButton = document.getElementById('upload-btn');
        uploadButton.addEventListener('click', () => {
            const fileInput = document.getElementById('file-upload');
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    console.log('File Content:', content);
                    // Here you can process the file content as needed
                };
                reader.readAsText(file);
            } else {
                alert('Please select a file to upload.');
            }
        });

        // Loading last spoken phrase from local storage
        const lastSpoken = localStorage.getItem('lastSpokenPhrase');
        if (lastSpoken) {
            output.innerHTML += `<br>Last spoken phrase: ${lastSpoken}`;
        }
    </script>
</body>
</html>
